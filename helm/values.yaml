replicaCount: 1

image:
  # Replace AWS_ACCOUNT_ID and AWS_REGION before deploying, or use: envsubst < helm/values.yaml
  repository: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/ai-image-generator
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80

resources:
  requests:
    cpu: "2"
    memory: "8Gi"
  limits:
    cpu: "4"
    memory: "16Gi"
